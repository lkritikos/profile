name: Preview

# Manual, on-demand per-branch preview. Runs the same gate as CI, then uploads a
# Worker version at 0% production traffic with a stable per-branch alias URL.
# workflow_dispatch only, so it never registers as a PR check and never deploys prod.
on:
  workflow_dispatch:

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/checks # lint + test + build gate (produces dist/)
      - name: Compute DNS-safe alias from the branch name
        id: alias
        env:
          REF_NAME: ${{ github.ref_name }} # via env to avoid script injection
        run: |
          alias=$(printf '%s' "$REF_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-63 | sed -E 's/-+$//')
          echo "value=$alias" >> "$GITHUB_OUTPUT"
      - name: Upload preview version
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias ${{ steps.alias.outputs.value }}
      - name: Surface the preview URL in the run summary
        run: |
          url="https://${{ steps.alias.outputs.value }}-profile.lkritikos.workers.dev"
          {
            echo "### 🔍 Preview deployed"
            echo ""
            echo "[$url]($url)"
          } >> "$GITHUB_STEP_SUMMARY"
