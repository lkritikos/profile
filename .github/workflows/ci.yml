name: CI

# Verify every PR. The same gate re-runs pre-deploy in deploy.yml on main, so
# deploy lives in its own workflow and never shows up as a (skipped) PR check.
on:
  pull_request:

# Supersede stale runs on a PR as new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the checks only need to read the repo.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/checks
