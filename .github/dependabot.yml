version: 2
updates:
  # npm dependencies — group minor/patch into a single weekly PR to keep noise
  # low; majors still arrive as their own PRs so they get a closer look.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # pnpm 11 refuses to install any package published less than 24h ago
    # (minimumReleaseAge default = 1 day), so a PR opened the instant a release
    # drops always red-fails the install gate for its first day. Wait out that
    # window (plus margin) so these PRs land green on the first CI run.
    cooldown:
      default-days: 3
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in ci.yml current. Group ALL updates, including
  # majors, into one PR: separate major bumps edit adjacent `uses:` lines in
  # ci.yml and conflict with each other, forcing one-at-a-time rebases.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - major
          - minor
          - patch
