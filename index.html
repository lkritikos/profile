<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lia Kritikos — Software Engineer</title>
    <!-- Fonts: Space Grotesk (headings), Inter (body), JetBrains Mono (labels).
         TODO(step 5): self-host these woff2 on the edge for perf + privacy. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply a stored explicit theme choice before first paint to avoid a
      // flash. No stored choice → leave it to prefers-color-scheme.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
