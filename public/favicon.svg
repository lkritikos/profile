<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- "LK" monogram, matching the in-page nav brand mark. Teal rounded tile,
       letters drawn as strokes so it renders identically at any size and
       needs no embedded font. Teal is teal[600] (#0d9488), a brand mid-tone
       legible on both light and dark browser tab bars. -->
  <rect width="64" height="64" rx="14" fill="#0d9488"/>
  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 18 V46 H28"/>
    <path d="M37 18 V46 M37 32 L48 18 M37 32 L49 46"/>
  </g>
</svg>
